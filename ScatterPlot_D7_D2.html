            function openPanel() {
                document.getElementById('side-panel').classList.add('open');
                document.getElementById('overlay').classList.add('show');
            }
            
            function closePanel() {
                document.getElementById('side-panel').classList.remove('open');
                document.getElementById('overlay').classList.remove('show');
            }
            
            document.getElementById('overlay').onclick = closePanel;
            
            // Capturar clicks en el scatter plot
            document.addEventListener('DOMContentLoaded', function() {
                const plotDiv = document.getElementById('scatter-plot');
                
                if (plotDiv) {
                    plotDiv.on('plotly_click', function(data) {
                        const point = data.points[0];
                        
                        // El nombre del participante está en customdata
                        const participante = point.customdata[0];
                        
                        if (citasData[participante]) {
                            const d7_info = citasData[participante]['D7'];
                            const d2_info = citasData[participante]['D2'];
                            
                            // Determinar correlación
                            const d7_val = d7_info.intensidad;
                            const d2_val = d2_info.intensidad;
                            
                            let correlacion, correlacionClass, status;
                            if ((d7_val === 1 && d2_val === 3) || (d7_val === 3 && d2_val === 1)) {
                                correlacion = "CORRELACIÓN INVERSA";
                                correlacionClass = "correlation-inversa";
                                status = "✓ CONFIRMA hipótesis: A menor comprensión, mayor humanización (o viceversa)";
                            } else if ((d7_val === 1 && d2_val === 1) || (d7_val === 3 && d2_val === 3)) {
                                correlacion = "CORRELACIÓN DIRECTA";
                                correlacionClass = "correlation-directa";
                                status = "⚠️ CONTRADICE hipótesis: Ambas dimensiones van en la misma dirección";
                            } else {
                                correlacion = "CORRELACIÓN NEUTRAL";
                                correlacionClass = "correlation-neutral";
                                status = "◯ Caso intermedio: Una o ambas dimensiones en nivel medio";
                            }
                            
                            // Actualizar panel
                            document.getElementById('panel-participante').textContent = participante;
                            
                            // Actualizar correlación
                            document.getElementById('panel-correlation').innerHTML = 
                                `<div class="correlation-badge ${correlacionClass}">${correlacion}</div>
                                <p style="margin-top: 12px; font-size: 13px; color: #4a5568;">${status}</p>`;
                            
                            // Actualizar D7
                            const d7_nivelClass = `nivel-${d7_info.nivel.toLowerCase()}`;
                            document.getElementById('panel-d7-nivel').innerHTML = 
                                `<span class="nivel-badge ${d7_nivelClass}">${d7_info.nivel} (${d7_info.intensidad})</span>`;
                            document.getElementById('panel-d7-quote').textContent = d7_info.cita;
                            
                            // Actualizar D2
                            const d2_nivelClass = `nivel-${d2_info.nivel.toLowerCase()}`;
                            document.getElementById('panel-d2-nivel').innerHTML = 
                                `<span class="nivel-badge ${d2_nivelClass}">${d2_info.nivel} (${d2_info.intensidad})</span>`;
                            document.getElementById('panel-d2-quote').textContent = d2_info.cita;
                            
                            // Abrir panel
                            openPanel();
                        }
                    });
                }
            });
        </script>
